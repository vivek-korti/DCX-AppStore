<div class="account-card">
  <h2>Personal Information</h2>
  <form (ngSubmit)="onSave()">
    
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" [(ngModel)]="userData.full_name" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" [(ngModel)]="userData.email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" name="mobile" [(ngModel)]="userData.mobile" placeholder="Enter your phone number">
    </div>

    <div class="form-group">
      <label>Address Line-1</label>
      <input type="text" name="address_line1" [(ngModel)]="userData.address_line1" placeholder="Enter your address">
    </div>

    <div class="form-group">
      <label>Address Line-2</label>
      <input type="text" name="address_line2" [(ngModel)]="userData.address_line2" placeholder="Enter your address">
    </div>

    <div class="grid-fields">
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" [(ngModel)]="userData.city" placeholder="City">
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" name="state" [(ngModel)]="userData.state" placeholder="State">
      </div>
      <div class="form-group">
        <label>PIN Code</label>
        <input type="text" name="pin_code" [(ngModel)]="userData.pin_code" placeholder="PIN Code">
      </div>
    </div>

    <button type="submit" class="save-changes-btn">Save Changes</button>
  </form>
</div>
