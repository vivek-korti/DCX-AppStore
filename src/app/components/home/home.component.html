<div class="home-wrapper">
  <div class="hero-banner">
    <div class="hero-content">
      <div class="hero-image-box">
        <img src="assets/images/oneplus_banner.png" alt="OnePlus Banner">
      </div>
      <div class="hero-text">
        <h2>OnePlus 13 Series (Slate Gray 8GB RAM + 128GB memory)</h2>
        <p>Cras justo odio, dapibus ac facilis in, egestas eget quam. Donec id elit non mi porta gravida.</p>
        <button class="buy-now">Buy Now!</button>
      </div>
    </div>
  </div>

  <div class="lower-section">
    <div class="sidebar">
      <div class="side-item" [class.active]="currentView === 'featured'" (click)="changeView('featured')">Featured Item</div>
      <div class="side-item" [class.active]="currentView === 'bestseller'" (click)="changeView('bestseller')">Best Seller</div>
      <div class="side-item" [class.active]="currentView === 'discount'" (click)="changeView('discount')">Summer Discount</div>
    </div>

    <div class="featured-card">
      <div class="card-info">
        <span class="badge">TRENDING</span>
        <h2>{{ content[currentView].title }}</h2>
        <p>{{ content[currentView].desc }}</p>
        <button class="read-more">Read More</button>
      </div>
      <div class="card-visual">
        <img [src]="content[currentView].image" [alt]="content[currentView].title">
      </div>
    </div>
  </div>
</div>
